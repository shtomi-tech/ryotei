<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#141413">
<link rel="manifest" href="manifest.webmanifest">
<title>旅程管理</title>
<style>
  :root{
    --ivory:#FAF9F6; --ivory-2:#F3F1EA; --ink:#141413; --ink-2:#514f49;
    --line:#141413; --line-soft:#c9c5b8; --clay:#b5532e;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--ivory);color:var(--ink);}
  body{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;line-height:1.6;-webkit-font-smoothing:antialiased;}
  .mono{font-family:"SFMono-Regular",Consolas,"Courier New",monospace;text-transform:uppercase;letter-spacing:.12em;}
  .wrap{max-width:900px;margin:0 auto;padding:40px 24px 80px;}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 24px;}
  .toolbar button,.toolbar select{background:var(--ivory);border:1.5px solid var(--line);color:var(--ink);padding:9px 12px;min-height:44px;font:12px inherit;cursor:pointer;}
  .toolbar button.active{background:var(--ink);color:var(--ivory);}
  .toolbar button:focus-visible,.toolbar select:focus-visible,nav.trips button:focus-visible{outline:3px solid var(--clay);outline-offset:2px;}
  .next-card{border:2px solid var(--line);padding:14px 16px;margin:0 0 24px;background:var(--ivory-2);}
  .next-card .label{font-size:10px;color:var(--ink-2);margin-bottom:4px;}
  .next-card strong{font-size:18px;display:block;}
  .next-card small{color:var(--ink-2);}
  .day.today{background:var(--ivory-2);padding-left:12px;padding-right:12px;}
  .day.today .day-date:after{content:" TODAY";font:10px "SFMono-Regular",Consolas,monospace;color:var(--clay);letter-spacing:.1em;}
  .item-link{font-size:11px;color:var(--ink);text-decoration:underline;margin-left:8px;white-space:nowrap;}
  .cost-summary{display:flex;gap:24px;flex-wrap:wrap;border-bottom:1px solid var(--line-soft);padding:0 10px 12px;margin-bottom:4px;}
  .cost-summary span{font-size:11px;color:var(--ink-2);}.cost-summary b{display:block;color:var(--ink);font:16px "SFMono-Regular",Consolas,monospace;}
  .expense-form{display:flex;gap:8px;margin-top:12px;max-width:560px;}
  .expense-form input,.expense-form button{border:1px solid var(--line);background:var(--ivory);padding:8px;font:13px inherit;}
  .expense-form input:first-child{flex:1;min-width:0;}.expense-form input[type=number]{width:110px;}.expense-form button{cursor:pointer;background:var(--ink);color:var(--ivory);}

  /* annual dashboard */
  .year-dashboard{display:grid;gap:20px;}
  .year-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .year-head h2{font-size:26px;margin:0;font-weight:700;}
  .year-head p{margin:4px 0 0;color:var(--ink-2);font-size:14px;}
  .year-switch{display:grid;gap:4px;color:var(--ink-2);font-size:11px;}
  .year-switch select{min-width:110px;background:var(--ivory);border:1.5px solid var(--line);padding:9px 10px;min-height:44px;font:14px inherit;color:var(--ink);}
  .year-switch select:focus-visible,.plan-form input:focus-visible,.plan-form textarea:focus-visible{outline:3px solid var(--clay);outline-offset:2px;}
  .year-summary{border:2px solid var(--line);padding:16px;background:var(--ivory-2);}
  .year-summary-title{font-size:12px;color:var(--ink-2);margin-bottom:12px;}
  .year-summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .year-stat{border-left:1px solid var(--line-soft);padding-left:12px;}
  .year-stat:first-child{border-left:0;padding-left:0;}
  .year-stat span{display:block;color:var(--ink-2);font-size:11px;}
  .year-stat b{display:block;font:24px "SFMono-Regular",Consolas,monospace;margin-top:2px;}
  .year-stat small{color:var(--ink-2);font-size:11px;}
  .goal-note{margin:16px 0 0;padding-top:12px;border-top:1px solid var(--line-soft);font-size:12px;color:var(--ink-2);}
  .resume-card{border:2px solid var(--line);padding:14px 16px;background:var(--ivory-2);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .resume-card p{margin:0;color:var(--ink-2);font-size:12px;}.resume-card strong{display:block;color:var(--ink);font-size:16px;margin-top:2px;}
  .resume-card button,.quarter-add,.completion-link{background:var(--ink);color:var(--ivory);border:1px solid var(--ink);padding:9px 12px;min-height:44px;font:12px inherit;cursor:pointer;}
  .quarter-add{justify-self:start;background:var(--ivory);color:var(--ink);}
  .resume-card button:focus-visible,.quarter-add:focus-visible,.completion-link:focus-visible,.empty-state button:focus-visible,.save-status button:focus-visible{outline:3px solid var(--clay);outline-offset:2px;}
  .completion-card{border:2px solid var(--line);padding:16px;background:var(--ivory-2);margin:0 0 24px;}
  .completion-card h3{margin:0 0 8px;font-size:20px;}.completion-card p{margin:4px 0;color:var(--ink-2);font-size:13px;}
  .completion-card ul{margin:10px 0 14px;padding-left:20px;font-size:13px;}.completion-card li+li{margin-top:4px;}
  .completion-link{margin-top:10px;}
  .empty-state{border:1.5px dashed var(--line-soft);padding:16px;color:var(--ink-2);font-size:13px;margin:0 0 24px;}
  .empty-state button{margin-top:10px;background:var(--ivory);border:1px solid var(--line);color:var(--ink);padding:8px 12px;min-height:44px;font:12px inherit;cursor:pointer;}
  .entry-action-note{flex:0 0 auto;color:var(--ink-2);font-size:11px;}
  .save-status{min-height:24px;margin:0 0 16px;color:var(--ink-2);font-size:12px;}
  .save-status:empty{display:none;}
  .save-status button{margin-left:10px;background:var(--ivory);border:1px solid var(--line);color:var(--ink);padding:5px 9px;min-height:36px;font:11px inherit;cursor:pointer;}
  .quarter-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}
  .quarter-card{border:1.5px solid var(--line);padding:14px;min-height:190px;display:grid;align-content:start;gap:10px;}
  .quarter-card.is-done{border-width:2px;}
  .quarter-card.is-active{background:var(--ivory-2);}
  .quarter-card.is-empty{border-color:var(--line-soft);}
  .quarter-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--line-soft);padding-bottom:10px;}
  .quarter-head strong{font-size:20px;}
  .quarter-range{color:var(--ink-2);font-size:12px;}
  .q-status{margin-left:auto;border:1px solid var(--line);padding:3px 7px;font-size:10px;white-space:nowrap;}
  .q-status.done{background:var(--ink);color:var(--ivory);}
  .q-status.active{border-color:var(--clay);color:var(--clay);}
  .q-status.planned{border-style:dashed;}
  .q-status.empty{color:var(--ink-2);border-color:var(--line-soft);}
  .quarter-target{font-size:11px;color:var(--ink-2);}
  .annual-entry-list{list-style:none;margin:0;padding:0;display:grid;gap:8px;}
  .annual-entry{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-top:1px solid var(--line-soft);font-size:13px;}
  .annual-entry:first-child{border-top:0;padding-top:0;}
  .annual-entry-main{min-width:0;flex:1;}
  .annual-entry-title{display:block;font-weight:700;overflow-wrap:anywhere;}
  .annual-entry-meta{display:block;color:var(--ink-2);font-size:11px;margin-top:2px;}
  .entry-kind{flex:0 0 auto;border:1px solid var(--line-soft);padding:1px 5px;color:var(--ink-2);font-size:10px;}
  .entry-kind.plan{border-style:dashed;}
  .entry-open,.plan-delete{flex:0 0 auto;border:0;background:transparent;color:var(--ink);text-decoration:underline;padding:4px;min-height:44px;font:11px inherit;cursor:pointer;}
  .entry-open:focus-visible,.plan-delete:focus-visible,.plan-form summary:focus-visible{outline:3px solid var(--clay);outline-offset:2px;}
  .quarter-empty{color:var(--ink-2);font-size:12px;margin:0;}
  .plan-form{border:1.5px solid var(--line);padding:14px;display:grid;gap:12px;}
  .plan-form summary{cursor:pointer;font-weight:700;min-height:44px;display:flex;align-items:center;}
  .plan-form form{display:grid;gap:12px;max-width:680px;}
  .plan-fields{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:10px;}
  .plan-field{display:grid;gap:4px;font-size:12px;}
  .plan-field input,.plan-field textarea{width:100%;border:1px solid var(--line);background:var(--ivory);padding:9px 10px;font:14px inherit;color:var(--ink);min-height:44px;}
  .plan-field textarea{min-height:72px;resize:vertical;}
  .plan-form button[type=submit]{justify-self:start;background:var(--ink);color:var(--ivory);border:1px solid var(--ink);padding:10px 14px;min-height:44px;font:13px inherit;cursor:pointer;}
  .plan-note{margin:0;color:var(--ink-2);font-size:11px;}

  /* header */
  header{border-bottom:2px solid var(--line);padding-bottom:16px;margin-bottom:24px;}
  .kicker{font-size:11px;color:var(--ink-2);margin-bottom:8px;}
  h1{font-size:30px;margin:0;font-weight:700;letter-spacing:.02em;}

  /* trip tabs */
  nav.trips{display:flex;flex-wrap:wrap;gap:0;margin:20px 0 32px;border:2px solid var(--line);}
  nav.trips button{
    flex:1;min-width:140px;background:var(--ivory);color:var(--ink);border:0;
    border-right:1px solid var(--line-soft);padding:12px 14px;cursor:pointer;
    font-family:inherit;font-size:14px;text-align:left;
  }
  nav.trips button:last-child{border-right:0;}
  nav.trips button.active{background:var(--ink);color:var(--ivory);}
  nav.trips button .t-date{display:block;font-size:10px;letter-spacing:.1em;opacity:.7;margin-top:3px;}

  /* trip head */
  .trip-head{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:6px;}
  .trip-head h2{font-size:24px;margin:0;font-weight:700;}
  .trip-sub{color:var(--ink-2);font-size:14px;margin:0 0 20px;}
  .count{border:1.5px solid var(--line);padding:6px 12px;font-size:12px;white-space:nowrap;}
  .count b{font-size:16px;}
  .count.done{border-style:dashed;color:var(--ink-2);}

  /* section label */
  .sec{margin:36px 0 14px;font-size:12px;color:var(--ink-2);border-bottom:1px solid var(--line-soft);padding-bottom:6px;}

  /* timeline */
  .day{border-top:2px solid var(--line);padding:16px 0;}
  .day:first-child{border-top:2px solid var(--line);}
  .day-head{display:flex;align-items:baseline;gap:14px;margin-bottom:12px;}
  .day-date{font-size:20px;font-weight:700;}
  .day-wd{font-size:12px;color:var(--ink-2);border:1px solid var(--line-soft);padding:1px 7px;}
  .day-title{font-size:15px;color:var(--ink-2);}
  ul.items{list-style:none;margin:0;padding:0;}
  ul.items li{display:flex;gap:16px;padding:5px 0;align-items:baseline;}
  .it-time{flex:0 0 52px;font-size:13px;text-align:right;color:var(--ink);}
  .it-time.empty{color:var(--line-soft);}
  .it-text{flex:1;font-size:15px;}
  .it-tag{flex:0 0 auto;font-size:10px;padding:1px 7px;border:1px solid var(--line-soft);color:var(--ink-2);}
  .it-tag[data-t="move"]{border-color:var(--ink);color:var(--ink);}
  .it-tag[data-t="stay"]{background:var(--ink);color:var(--ivory);border-color:var(--ink);}
  .it-tag[data-t="spot"]{border-style:dashed;}

  /* checklist */
  ul.check{list-style:none;margin:0;padding:0;}
  ul.check li{display:flex;gap:12px;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--line-soft);}
  .box{flex:0 0 auto;width:44px;height:44px;border:1.5px solid var(--ink);background:var(--ivory);display:inline-block;text-align:center;line-height:40px;font-size:16px;cursor:pointer;}
  .box.on{background:var(--ink);color:var(--ivory);}
  .ck-text.on{color:var(--ink-2);text-decoration:line-through;}

  /* costs */
  table.cost{width:100%;border-collapse:collapse;font-size:14px;}
  table.cost th,table.cost td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line-soft);}
  table.cost th{font-size:11px;color:var(--ink-2);border-bottom:1.5px solid var(--line);}
  table.cost td.num{text-align:right;font-family:"SFMono-Regular",Consolas,monospace;}
  table.cost .paid{font-size:10px;color:var(--ink-2);border:1px solid var(--line-soft);padding:0 5px;}
  table.cost .paid.yes{background:var(--ink);color:var(--ivory);border-color:var(--ink);}
  .grp-row td{background:var(--ivory-2);font-size:11px;color:var(--ink-2);letter-spacing:.1em;}
  tfoot td{border-top:2px solid var(--line);font-weight:700;font-size:16px;padding-top:12px;}
  tfoot td.num{font-family:"SFMono-Regular",Consolas,monospace;}
  .cost-note{font-size:12px;color:var(--ink-2);margin-top:8px;}

  footer{margin-top:60px;border-top:1px solid var(--line-soft);padding-top:12px;font-size:11px;color:var(--ink-2);}

  @media print{
    nav.trips{display:none;} body{background:#fff;} .wrap{max-width:none;}
    .toolbar,.next-card{display:none;} .day:not(.today){break-inside:avoid;}
  }
  @media(max-width:560px){
    ul.items li{flex-wrap:wrap;} .it-time{flex-basis:44px;}
    .year-summary-grid{grid-template-columns:repeat(2,1fr);gap:16px 12px;}
    .year-stat:nth-child(3){border-left:0;padding-left:0;}
    .quarter-grid{grid-template-columns:1fr;}
    .plan-fields{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker mono">Travel Itinerary</div>
    <h1>旅程管理</h1>
  </header>

  <nav class="trips" id="tabs"></nav>
  <div class="toolbar" aria-label="表示操作">
    <button id="yearBtn" type="button">年間ダッシュボード</button>
    <button id="todayBtn" type="button">今日の予定</button>
    <button id="allBtn" type="button" class="active">全日程</button>
    <select id="daySelect" aria-label="日付へ移動"><option value="">日付へ移動</option></select>
    <button id="printBtn" type="button">印刷</button>
  </div>
  <p id="saveStatus" class="save-status" role="status" aria-live="polite"></p>
  <main id="view"></main>

  <footer class="mono">Local itinerary · checklist, expenses, and annual plans are saved on this device</footer>
</div>

<script src="data.js"></script>
<script>
const TAG_LABEL = { move:"移動", stay:"宿泊", spot:"観光", meal:"食事" };
const WEEK = ["日","月","火","水","木","金","土"];
const ANNUAL_GOAL = { quarters:4, minDays:4, minNights:3 };
const QUARTERS = [
  { number:1, label:"Q1", months:"1–3月", startMonth:0, endMonth:2 },
  { number:2, label:"Q2", months:"4–6月", startMonth:3, endMonth:5 },
  { number:3, label:"Q3", months:"7–9月", startMonth:6, endMonth:8 },
  { number:4, label:"Q4", months:"10–12月", startMonth:9, endMonth:11 },
];
let activeTrip = null;
let viewMode = "all";
let screenMode = "trip";
let allTrips = [];
let annualYear = new Date().getFullYear();

function escapeHTML(value){
  return String(value ?? "").replace(/[&<>\"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'\"':"&quot;","'":"&#39;"}[ch]));
}

function fmtYen(n){ return "¥" + n.toLocaleString("ja-JP"); }
function parseDate(value){
  if(!/^\d{4}-\d{2}-\d{2}$/.test(String(value||""))) return null;
  const d = new Date(value + "T00:00:00");
  return Number.isNaN(d.getTime()) ? null : d;
}
function tripDate(trip, day, index){
  if(/^\d{4}-\d{2}-\d{2}$/.test(day.date)) return new Date(day.date + "T00:00:00");
  const d = new Date(trip.start + "T00:00:00"); d.setDate(d.getDate()+index); return d;
}
function dateLabel(d){ return `${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`; }
function sameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function storageKey(trip){ return `ryotei-checklist-${trip.id}`; }
function costKey(trip){ return `ryotei-costs-${trip.id}`; }
function lastTripKey(){ return "ryotei-last-trip-v1"; }
function getExtraCosts(trip){ try{return JSON.parse(localStorage.getItem(costKey(trip)))||[];}catch(e){return [];} }
function setSaveStatus(message, action){
  const status=document.getElementById("saveStatus");
  if(!status) return;
  status.textContent="";
  const text=document.createElement("span"); text.textContent=message; status.appendChild(text);
  if(action){
    const button=document.createElement("button"); button.type="button"; button.textContent=action.label;
    button.addEventListener("click",()=>{ action.run(); }); status.appendChild(button);
  }
}
function writeLastTrip(trip,dayIndex=0){
  if(!trip) return;
  localStorage.setItem(lastTripKey(),JSON.stringify({tripId:String(trip.id),dayIndex:Number(dayIndex)||0}));
}
function readLastTrip(){
  try { const saved=JSON.parse(localStorage.getItem(lastTripKey())); return saved && saved.tripId ? saved : null; }
  catch(e){ return null; }
}
function annualPlanKey(){ return "ryotei-annual-plans-v1"; }
function getAnnualConfig(){
  const config = window.TRAVEL_PLAN || {};
  const goal = config.goal || {};
  return {
    year: Number(config.year) || new Date().getFullYear(),
    goal: {
      quarters: Number(goal.quarters) || ANNUAL_GOAL.quarters,
      minDays: Number(goal.minDays) || ANNUAL_GOAL.minDays,
      minNights: Number(goal.minNights) || ANNUAL_GOAL.minNights,
    },
    plans: Array.isArray(config.plans) ? config.plans : [],
  };
}
function readLocalPlans(){
  try {
    const saved = JSON.parse(localStorage.getItem(annualPlanKey()));
    return Array.isArray(saved) ? saved.filter(p => p && p.start && p.end) : [];
  } catch(e) { return []; }
}
function writeLocalPlans(plans){ localStorage.setItem(annualPlanKey(),JSON.stringify(plans)); }
function getAnnualPlans(){
  const configured = getAnnualConfig().plans.map((plan,i)=>({ ...plan, source:"data", id:String(plan.id||`data-plan-${i}`) }));
  const local = readLocalPlans().map(plan=>({ ...plan, source:"local", id:String(plan.id) }));
  return [...configured,...local];
}
function yearOf(value){ const d=parseDate(value); return d ? d.getFullYear() : null; }
function durationForRange(start,end){
  const startDate=parseDate(start), endDate=parseDate(end);
  if(!startDate || !endDate || endDate < startDate) return null;
  const days=daysBetween(startDate,endDate)+1;
  return { days, nights:Math.max(0,days-1) };
}
function durationLabel(range){ return range ? `${range.nights}泊${range.days}日` : "期間不明"; }
function isLongRange(start,end){
  const duration=durationForRange(start,end), goal=getAnnualConfig().goal;
  return Boolean(duration && duration.days >= goal.minDays && duration.nights >= goal.minNights);
}
function quarterForDate(date){ return date ? Math.floor(date.getMonth()/3)+1 : null; }
function rangeLabel(start,end){
  const startDate=parseDate(start), endDate=parseDate(end);
  if(!startDate || !endDate) return "日程未登録";
  return `${dateLabel(startDate)} – ${dateLabel(endDate)}`;
}
function todayStart(){ const now=new Date(); return new Date(now.getFullYear(),now.getMonth(),now.getDate()); }
function actualState(start,end){
  const startDate=parseDate(start), endDate=parseDate(end), today=todayStart();
  if(!startDate || !endDate) return "planned";
  if(endDate < today) return "done";
  if(startDate <= today && endDate >= today) return "active";
  return "planned";
}
function getYearOptions(){
  const years = new Set([new Date().getFullYear(), getAnnualConfig().year]);
  allTrips.forEach(trip=>{ if(yearOf(trip.start)) years.add(yearOf(trip.start)); });
  getAnnualPlans().forEach(plan=>{
    const planYear=Number(plan.year);
    if(Number.isInteger(planYear) && planYear > 0) years.add(planYear);
    else if(yearOf(plan.start)) years.add(yearOf(plan.start));
  });
  return [...years].sort((a,b)=>b-a);
}
function getChecklist(trip){
  try { const saved=JSON.parse(localStorage.getItem(storageKey(trip))); return Array.isArray(saved)?saved:trip.checklist||[]; }
  catch(e){ return trip.checklist||[]; }
}
function completedTripHTML(trip){
  const checklist=Array.isArray(trip.checklist) ? getChecklist(trip) : [];
  const remaining=checklist.filter(item=>!item.done).length;
  const costs=[...(trip.costs||[]),...getExtraCosts(trip)];
  const total=costs.reduce((sum,item)=>sum+Number(item.amount||0),0);
  const duration=durationForRange(trip.start,trip.end);
  const details=[];
  if(duration) details.push(`${duration.nights}泊${duration.days}日`);
  if(checklist.length) details.push(remaining ? `未完了の持ち物 ${remaining}件` : "持ち物チェック完了");
  if(costs.length) details.push(`記録した費用 ${fmtYen(total)}`);
  const year=yearOf(trip.start)||annualYear;
  return `<section class="completion-card" aria-labelledby="completionTitle">
    <div class="kicker mono">TRIP COMPLETE</div><h3 id="completionTitle">この旅行の記録</h3>
    <p>${escapeHTML(trip.title)}は終了しました。</p>
    <ul>${(details.length ? details : ["旅程の記録を確認できます。"]).map(item=>`<li>${escapeHTML(item)}</li>`).join("")}</ul>
    <p>残った持ち物や費用を確認したら、年間計画に戻って次の旅行を決められます。</p>
    <button class="completion-link" type="button" data-back-annual="${year}">年間計画へ戻る</button>
  </section>`;
}
function nextEvent(trip){
  const now=new Date();
  for(let di=0;di<trip.days.length;di++){
    const day=trip.days[di], date=tripDate(trip,day,di);
    for(const item of (day.items||[])) if(item.time){
      const at=new Date(date); const [h,m]=item.time.split(":").map(Number); at.setHours(h,m,0,0);
      if(at>=now) return {item,day,date,at};
    }
  }
  return null;
}

function daysBetween(a, b){
  const MS = 86400000;
  const d0 = new Date(a.getFullYear(),a.getMonth(),a.getDate());
  const d1 = new Date(b.getFullYear(),b.getMonth(),b.getDate());
  return Math.round((d1 - d0)/MS);
}

function countdownHTML(trip){
  const today = new Date();
  const start = new Date(trip.start + "T00:00:00");
  const end = new Date(trip.end + "T00:00:00");
  const dStart = daysBetween(today, start);
  if(dStart > 0)  return `<div class="count">出発まで <b>${dStart}</b> 日</div>`;
  const dEnd = daysBetween(today, end);
  if(dStart <= 0 && dEnd >= 0) return `<div class="count">旅行中 <b>${daysBetween(start,today)+1}</b> 日目</div>`;
  return `<div class="count done">終了した旅行</div>`;
}

function renderTrip(trip){
  activeTrip=trip;
  const v = document.getElementById("view");
  const range = `${trip.start.slice(5).replace("-","/")} – ${trip.end.slice(5).replace("-","/")}`;

  // days
  const today=new Date();
  const hasVisibleDay=viewMode !== "today" || trip.days.some((d,di)=>sameDay(tripDate(trip,d,di),today));
  const days = trip.days.map((d,di)=>{
    const date=tripDate(trip,d,di), isToday=sameDay(date,today);
    if(viewMode === "today" && !isToday) return "";
    const items = d.items.map(it=>{
      const tag = it.tag ? `<span class="it-tag" data-t="${it.tag}">${TAG_LABEL[it.tag]||""}</span>` : "";
      const tCls = it.time ? "" : " empty";
      const mapUrl = it.mapUrl || (["spot","meal","stay"].includes(it.tag) ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(it.text.split("（")[0])}` : "");
      const map = mapUrl ? `<a class="item-link" href="${mapUrl}" target="_blank" rel="noopener">地図</a>` : "";
      return `<li><span class="it-time${tCls}">${it.time||"–"}</span>
        <span class="it-text">${it.text}${map}</span>${tag}</li>`;
    }).join("");
    return `<div class="day${isToday?" today":""}" id="day-${di}">
      <div class="day-head">
        <span class="day-date">${dateLabel(date)}</span>
        <span class="day-wd">${WEEK[date.getDay()]}</span>
        <span class="day-title">${d.title||""}</span>
      </div>
      <ul class="items">${items}</ul>
    </div>`;
  }).join("");

  // checklist
  let checkHTML = "";
  if(trip.checklist && trip.checklist.length){
    const checklist=getChecklist(trip), done = checklist.filter(c=>c.done).length;
    const lis = checklist.map((c,i)=>`<li><button class="box ${c.done?"on":""}" data-check="${i}" aria-label="${c.done?"未完了に戻す":"完了にする"}">${c.done?"✓":""}</button>
      <span class="ck-text ${c.done?"on":""}">${c.text}</span></li>`).join("");
    checkHTML = `<div class="sec mono">Checklist — ${done}/${checklist.length}</div>
      <ul class="check">${lis}</ul>`;
  }

  // costs grouped
  let costHTML = "";
  if(trip.costs && trip.costs.length){
    const costs=[...trip.costs,...getExtraCosts(trip)];
    const groups = {};
    costs.forEach(c=>{ (groups[c.group]=groups[c.group]||[]).push(c); });
    let rows = "";
    let total = 0;
    Object.keys(groups).forEach(g=>{
      rows += `<tr class="grp-row"><td colspan="3">${g}</td></tr>`;
      groups[g].forEach(c=>{
        total += c.amount;
        const paid = c.paid
          ? `<span class="paid yes">支払済</span>`
          : `<span class="paid">未</span>`;
        const note = c.note ? ` <span style="color:var(--ink-2);font-size:12px">/ ${c.note}</span>` : "";
        rows += `<tr><td>${c.item}${note}</td><td>${paid}</td>
          <td class="num">${fmtYen(c.amount)}</td></tr>`;
      });
    });
    const paidTotal=costs.filter(c=>c.paid).reduce((s,c)=>s+c.amount,0), unpaidTotal=total-paidTotal;
    const budgetHTML=trip.budget?`<span>予算差額<b>${fmtYen(trip.budget-total)}</b></span>`:"";
    costHTML = `<div class="sec mono">Costs</div><div class="cost-summary"><span>合計<b>${fmtYen(total)}</b></span><span>支払済<b>${fmtYen(paidTotal)}</b></span><span>未払い<b>${fmtYen(unpaidTotal)}</b></span><span>1人あたり<b>${fmtYen(Math.ceil(total/(trip.people||1)))}</b></span>${budgetHTML}</div>
      <table class="cost">
        <thead><tr><th>項目</th><th>支払</th><th style="text-align:right">金額</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr><td>合計</td><td></td><td class="num">${fmtYen(total)}</td></tr></tfoot>
      </table>
      <div class="cost-note">※ 食事は概算。入場料・現地交通費等は別途。</div>
      <form class="expense-form" id="expenseForm"><input name="item" required placeholder="現地支出" aria-label="支出項目"><input name="amount" required type="number" min="0" step="1" placeholder="金額" aria-label="金額"><button type="submit">追加</button></form>`;
  }

  const next=nextEvent(trip);
  const nextHTML=next ? `<div class="next-card"><div class="label mono">NEXT EVENT</div><strong>${next.item.time} — ${next.item.text}</strong><small>${dateLabel(next.date)}（${WEEK[next.date.getDay()]}） · ${Math.max(0,Math.round((next.at-new Date())/60000))}分後</small></div>` : "";
  const completionHTML=actualState(trip.start,trip.end) === "done" ? completedTripHTML(trip) : "";
  const emptyTodayHTML=!hasVisibleDay ? `<div class="empty-state">今日の予定はこの旅行に登録されていません。<br><button type="button" data-show-all>全日程を見る</button></div>` : "";
  v.innerHTML = `${nextHTML}
    ${completionHTML}
    <div class="trip-head">
      <h2>${trip.title}</h2>
      ${countdownHTML(trip)}
    </div>
    <p class="trip-sub">${trip.subtitle||""} <span class="mono" style="font-size:11px;margin-left:8px">${range}</span></p>
    <div class="sec mono">Itinerary</div>
    ${hasVisibleDay ? days : emptyTodayHTML}
    ${checkHTML}
    ${costHTML}
  `;
  v.querySelectorAll("[data-check]").forEach(btn=>btn.addEventListener("click",()=>{
    const list=getChecklist(trip), i=Number(btn.dataset.check); list[i].done=!list[i].done; localStorage.setItem(storageKey(trip),JSON.stringify(list)); setSaveStatus("チェックリストを保存しました。"); renderTrip(trip);
  }));
  const expenseForm=document.getElementById("expenseForm");
  if(expenseForm) expenseForm.addEventListener("submit",e=>{e.preventDefault(); const f=new FormData(expenseForm); const extra=getExtraCosts(trip); extra.push({group:"現地",item:String(f.get("item")),amount:Number(f.get("amount")),paid:true,note:"端末入力"}); localStorage.setItem(costKey(trip),JSON.stringify(extra)); setSaveStatus("現地支出を保存しました。"); renderTrip(trip);});
  v.querySelector("[data-show-all]")?.addEventListener("click",()=>showTrip(trip,"all",0));
  v.querySelector("[data-back-annual]")?.addEventListener("click",event=>renderAnnualDashboard(Number(event.currentTarget.dataset.backAnnual)||annualYear));
}

function updateDaySelect(trip){
  const daySelect=document.getElementById("daySelect");
  if(!daySelect || !trip) return;
  daySelect.innerHTML='<option value="">日付へ移動</option>'+(trip.days||[]).map((d,i)=>`<option value="${i}">${dateLabel(tripDate(trip,d,i))} ${escapeHTML(d.title||"")}</option>`).join("");
}
function updateModeButtons(){
  document.getElementById("yearBtn")?.classList.toggle("active",screenMode === "annual");
  document.getElementById("todayBtn")?.classList.toggle("active",screenMode === "trip" && viewMode === "today");
  document.getElementById("allBtn")?.classList.toggle("active",screenMode === "trip" && viewMode === "all");
}
function showTrip(trip, mode="all", dayIndex=0){
  if(!trip) return;
  activeTrip=trip; viewMode=mode; screenMode="trip"; writeLastTrip(trip,dayIndex);
  updateModeButtons();
  updateDaySelect(trip);
  document.querySelectorAll("#tabs button").forEach(btn=>btn.classList.toggle("active",allTrips[Number(btn.dataset.i)]?.id === trip.id));
  renderTrip(trip);
}
function annualEntry(kind,data){
  const dataYear=Number(data.year), dataQuarter=Number(data.quarter);
  return {
    kind:kind === "plan" && data.actual ? "record" : kind,
    id:String(data.id||""),
    title:String(data.title||"名称未設定"),
    start:String(data.start||""),
    end:String(data.end||""),
    year:Number.isInteger(dataYear) && dataYear > 0 ? dataYear : yearOf(data.start),
    quarter:Number.isInteger(dataQuarter) && dataQuarter >= 1 && dataQuarter <= 4 ? dataQuarter : quarterForDate(parseDate(data.start)),
    note:String(data.note||""),
    source:data.source || "",
    data,
  };
}
function getQuarterStatus(entries){
  const longEntries=entries.filter(entry=>isLongRange(entry.start,entry.end));
  if(longEntries.some(entry=>["trip","record"].includes(entry.kind) && actualState(entry.start,entry.end) === "done")) return { key:"done", label:"達成" };
  if(longEntries.some(entry=>["trip","record"].includes(entry.kind) && actualState(entry.start,entry.end) === "active")) return { key:"active", label:"進行中" };
  if(longEntries.length) return { key:"planned", label:"計画あり" };
  if(entries.some(entry=>entry.quarter && !entry.start && !entry.end)) return { key:"planned", label:"計画あり" };
  if(entries.length) return { key:"short", label:"長期旅行未登録" };
  return { key:"empty", label:"未計画" };
}
function renderAnnualDashboard(year){
  annualYear=Number(year)||annualYear;
  screenMode="annual";
  updateModeButtons();
  const config=getAnnualConfig(), goal=config.goal;
  const trips=allTrips.filter(trip=>yearOf(trip.start) === annualYear).map(trip=>annualEntry("trip",trip));
  const plans=getAnnualPlans().map(plan=>annualEntry("plan",plan)).filter(plan=>plan.year === annualYear);
  const entries=[...trips,...plans].sort((a,b)=>(a.quarter||9)-(b.quarter||9) || a.start.localeCompare(b.start) || a.title.localeCompare(b.title));
  const quarterViews=QUARTERS.map(quarter=>{
    const quarterEntries=entries.filter(entry=>entry.quarter === quarter.number);
    return { quarter, entries:quarterEntries, status:getQuarterStatus(quarterEntries) };
  });
  const doneCount=quarterViews.filter(view=>view.status.key === "done").length;
  const activeCount=quarterViews.filter(view=>view.status.key === "active").length;
  const plannedCount=quarterViews.filter(view=>view.status.key === "planned").length;
  const missingCount=goal.quarters-doneCount-activeCount-plannedCount;
  const yearOptions=getYearOptions().map(option=>`<option value="${option}" ${option===annualYear?"selected":""}>${option}年</option>`).join("");
  const lastTripState=readLastTrip();
  const resumeTrip=lastTripState ? allTrips.find(trip=>String(trip.id) === String(lastTripState.tripId)) : null;
  const resumeHTML=resumeTrip ? `<div class="resume-card"><div><div class="kicker mono">CONTINUE</div><p>前回開いていた旅程</p><strong>${escapeHTML(resumeTrip.title)}</strong></div><button type="button" data-resume-trip="${escapeHTML(resumeTrip.id)}">旅程を再開</button></div>` : "";
  const defaultStart=`${annualYear}-01-01`, defaultEnd=`${annualYear}-01-04`;
  const quarterCards=quarterViews.map(view=>{
    const entryHTML=view.entries.length ? `<ul class="annual-entry-list">${view.entries.map(entry=>{
      const longLabel=isLongRange(entry.start,entry.end) ? "目安を満たす" : entry.start && entry.end ? "短期" : "日程未登録";
      const note=entry.note ? ` · ${escapeHTML(entry.note)}` : "";
      const open=entry.kind === "trip"
        ? `<button class="entry-open" type="button" data-trip-id="${escapeHTML(entry.id)}">旅程を開く</button>`
        : entry.source === "local" ? `<button class="plan-delete" type="button" data-plan-delete="${escapeHTML(entry.id)}">削除</button>` : "";
      const kindClass=entry.kind === "plan" ? "plan" : entry.kind === "record" ? "record" : "";
      const kindLabel=entry.kind === "plan" ? "計画" : entry.kind === "record" ? "実績" : "旅程";
      const detailNote=entry.kind === "record" && entry.source !== "local" ? `<span class="entry-action-note">詳細旅程未登録</span>` : "";
      return `<li class="annual-entry"><span class="entry-kind ${kindClass}">${kindLabel}</span><div class="annual-entry-main"><span class="annual-entry-title">${escapeHTML(entry.title)}</span><span class="annual-entry-meta">${escapeHTML(rangeLabel(entry.start,entry.end))} · ${durationLabel(durationForRange(entry.start,entry.end))} · ${longLabel}${note}</span></div>${open}${detailNote}</li>`;
    }).join("")}</ul>` : `<p class="quarter-empty">この四半期の旅行はまだ登録されていません。</p>`;
    const quarterStart=`${annualYear}-${String(view.quarter.startMonth+1).padStart(2,"0")}-01`;
    const quarterEnd=`${annualYear}-${String(view.quarter.startMonth+1).padStart(2,"0")}-04`;
    const addQuarterHTML=`<button class="quarter-add" type="button" data-plan-quarter="${view.quarter.number}" data-plan-start="${quarterStart}" data-plan-end="${quarterEnd}">この四半期に旅行を追加</button>`;
    return `<article class="quarter-card is-${view.status.key}"><div class="quarter-head"><strong>${view.quarter.label}</strong><span class="quarter-range">${view.quarter.months}</span><span class="q-status ${view.status.key}">${view.status.label}</span></div><div class="quarter-target">目安：${goal.minNights}泊${goal.minDays}日以上</div>${entryHTML}${view.entries.length ? "" : addQuarterHTML}</article>`;
  }).join("");
  document.getElementById("view").innerHTML=`<section class="year-dashboard">
    <div class="year-head"><div><div class="kicker mono">Annual Dashboard</div><h2>${annualYear}年の旅行計画</h2><p>3か月に1回、${goal.minNights}泊${goal.minDays}日以上の旅行を目安にします。</p></div><label class="year-switch">表示する年<select id="annualYearSelect" aria-label="表示する年">${yearOptions}</select></label></div>
    ${resumeHTML}
    <div class="year-summary"><div class="year-summary-title mono">QUARTERLY TARGET · ${goal.quarters} QUARTERS</div><div class="year-summary-grid"><div class="year-stat"><span>達成</span><b>${doneCount}/${goal.quarters}</b><small>終了した長期旅行</small></div><div class="year-stat"><span>進行中</span><b>${activeCount}</b><small>現在の長期旅行</small></div><div class="year-stat"><span>計画あり</span><b>${plannedCount}</b><small>旅程・計画を登録済み</small></div><div class="year-stat"><span>未計画</span><b>${Math.max(0,missingCount)}</b><small>四半期</small></div></div><p class="goal-note">「達成」は終了日を過ぎた${goal.minNights}泊${goal.minDays}日以上の旅程です。同じ四半期に複数登録しても、目安の達成数は1つとして数えます。</p></div>
    <div class="sec mono">Quarterly Plan</div><div class="quarter-grid">${quarterCards}</div>
    <details class="plan-form" id="planFormDetails"><summary>旅行計画を追加</summary><form id="planForm"><div class="plan-fields"><label class="plan-field">旅行名<input name="title" required maxlength="80" placeholder="例：秋の温泉旅行"></label><label class="plan-field">出発日<input name="start" type="date" required value="${defaultStart}"></label><label class="plan-field">帰着日<input name="end" type="date" required value="${defaultEnd}"></label></div><label class="plan-field">メモ（任意）<textarea name="note" maxlength="200" placeholder="行き先、同行者、予約状況など"></textarea></label><button type="submit">この計画を保存</button><p class="plan-note">計画はこの端末に保存されます。実際の旅程の詳細は、従来どおり data.js に登録してください。</p></form></details>
  </section>`;
  document.getElementById("annualYearSelect")?.addEventListener("change",event=>renderAnnualDashboard(Number(event.target.value)));
  document.querySelectorAll("[data-resume-trip]").forEach(button=>button.addEventListener("click",()=>{
    const state=readLastTrip(), trip=allTrips.find(item=>String(item.id) === button.dataset.resumeTrip);
    if(!trip) return;
    showTrip(trip,"all",Number(state?.dayIndex)||0);
    if(state?.dayIndex) document.getElementById("day-"+Number(state.dayIndex))?.scrollIntoView({behavior:"smooth"});
  }));
  document.querySelectorAll("[data-plan-quarter]").forEach(button=>button.addEventListener("click",()=>{
    const details=document.getElementById("planFormDetails"), form=document.getElementById("planForm");
    if(!details || !form) return;
    details.open=true;
    form.elements.start.value=button.dataset.planStart;
    form.elements.end.value=button.dataset.planEnd;
    details.scrollIntoView({behavior:"smooth",block:"start"});
    form.elements.title.focus();
  }));
  document.querySelectorAll("[data-trip-id]").forEach(button=>button.addEventListener("click",()=>{
    const trip=allTrips.find(item=>String(item.id) === button.dataset.tripId);
    showTrip(trip,"all");
  }));
  document.querySelectorAll("[data-plan-delete]").forEach(button=>button.addEventListener("click",()=>{
    const plans=readLocalPlans(), deletedIndex=plans.findIndex(plan=>String(plan.id) === button.dataset.planDelete);
    if(deletedIndex < 0) return;
    const deletedPlan=plans[deletedIndex];
    if(!window.confirm(`「${deletedPlan.title||"旅行計画"}」を削除しますか？`)) return;
    writeLocalPlans(plans.filter(plan=>String(plan.id) !== button.dataset.planDelete));
    renderAnnualDashboard(annualYear);
    setSaveStatus("旅行計画を削除しました。",{label:"元に戻す",run:()=>{
      const current=readLocalPlans(); current.splice(Math.min(deletedIndex,current.length),0,deletedPlan);
      writeLocalPlans(current); renderAnnualDashboard(annualYear); setSaveStatus("旅行計画を復元しました。");
    }});
  }));
  document.getElementById("planForm")?.addEventListener("submit",event=>{
    event.preventDefault();
    const form=event.currentTarget, fields=new FormData(form);
    const title=String(fields.get("title")||"").trim(), start=String(fields.get("start")||""), end=String(fields.get("end")||"");
    const endInput=form.elements.end;
    endInput.setCustomValidity(start && end && end < start ? "帰着日は出発日以降にしてください。" : "");
    if(!form.reportValidity()) return;
    const localPlans=readLocalPlans();
    localPlans.push({id:`plan-${Date.now()}`,title,start,end,note:String(fields.get("note")||"").trim()});
    writeLocalPlans(localPlans);
    annualYear=yearOf(start)||annualYear;
    renderAnnualDashboard(annualYear);
    setSaveStatus("旅行計画をこの端末に保存しました。");
  });
}

function init(){
  allTrips = (window.TRIPS||[]).slice();
  const tabs = document.getElementById("tabs");
  // 直近の未来／進行中を先頭に、次いで開始日の新しい順
  const today = new Date();
  allTrips.sort((a,b)=>{
    const fa = daysBetween(today, new Date(a.end+"T00:00:00")) >= 0;
    const fb = daysBetween(today, new Date(b.end+"T00:00:00")) >= 0;
    if(fa !== fb) return fa ? -1 : 1;          // 未終了を先に
    return fa ? (a.start < b.start ? -1 : 1)   // 未終了は近い順
             : (a.start > b.start ? -1 : 1);   // 終了済は新しい順
  });

  if(allTrips.length){
    tabs.innerHTML = allTrips.map((t,i)=>
    `<button data-i="${i}" class="${i===0?"active":""}">${t.title}
      <span class="t-date mono">${t.start.replace(/-/g,"/").slice(2)}</span></button>`
    ).join("");
    tabs.addEventListener("click", event=>{
      const button=event.target.closest("button");
      if(button) showTrip(allTrips[Number(button.dataset.i)],"all");
    });
  } else {
    tabs.style.display="none";
  }
  const daySelect=document.getElementById("daySelect");
  document.getElementById("yearBtn").addEventListener("click",()=>renderAnnualDashboard(annualYear));
  document.getElementById("todayBtn").addEventListener("click",()=>showTrip(activeTrip||allTrips[0],"today"));
  document.getElementById("allBtn").addEventListener("click",()=>showTrip(activeTrip||allTrips[0],"all"));
  daySelect.addEventListener("change",()=>{
    if(daySelect.value!=="" && activeTrip){
      const index=daySelect.value;
      showTrip(activeTrip,"all",Number(index));
      document.getElementById("day-"+index)?.scrollIntoView({behavior:"smooth"});
      daySelect.value="";
    }
  });
  document.getElementById("printBtn").addEventListener("click",()=>window.print());
  annualYear=getAnnualConfig().year||new Date().getFullYear();
  activeTrip=allTrips[0]||null;
  renderAnnualDashboard(annualYear);
}
init();
if ("serviceWorker" in navigator && location.protocol !== "file:") navigator.serviceWorker.register("sw.js");
</script>
